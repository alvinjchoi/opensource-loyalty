openapi: 3.1.2
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: Loyalty Interchange Protocol
  version: 0.1.0
  description: Vendor-neutral loyalty transaction API with the foodservice/1.0 profile.
  license:
    name: Apache-2.0
    identifier: Apache-2.0
servers:
  - url: https://loyalty.example.com/lip/v1
security:
  - bearerAuth: []
tags:
  - name: Discovery
  - name: Programs
  - name: Accounts
  - name: Ledger
  - name: Members
  - name: Orders
  - name: Accruals
  - name: Redemptions
  - name: Issued Rewards
paths:
  /.well-known/lip:
    get:
      operationId: discoverLoyaltyProtocol
      summary: Discover LIP endpoints and authentication
      tags:
        - Discovery
      servers:
        - url: https://loyalty.example.com
      security: []
      x-lip-safe-to-retry: true
      responses:
        "200":
          description: LIP discovery document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WellKnownDocument"
  /health:
    get:
      operationId: getHealth
      summary: Check service health
      tags:
        - Discovery
      servers:
        - url: https://loyalty.example.com
      security: []
      x-lip-safe-to-retry: true
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthDocument"
  /capabilities:
    get:
      operationId: getCapabilities
      summary: Get negotiated operations, effects, events, and limits
      tags:
        - Discovery
      x-lip-safe-to-retry: true
      responses:
        "200":
          description: Supported LIP capabilities
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CapabilitiesDocument"
        default:
          $ref: "#/components/responses/Problem"
  /programs/get:
    post:
      operationId: getProgram
      summary: Get program, tier, and reward definitions
      tags:
        - Programs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramGetRequest"
      responses:
        "200":
          description: Get program, tier, and reward definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgramGetResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: true
  /accounts/get:
    post:
      operationId: getMemberAccount
      summary: Get balances, metrics, and tier progress
      tags:
        - Accounts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberAccountRequest"
      responses:
        "200":
          description: Get balances, metrics, and tier progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberAccountResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: true
  /ledger/list:
    post:
      operationId: listLedgerEntries
      summary: List member ledger entries
      tags:
        - Ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LedgerListRequest"
      responses:
        "200":
          description: List member ledger entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerListResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: true
  /ledger/manual-adjustments:
    post:
      operationId: postManualAdjustment
      summary: Credit or debit points with an operator classification
      tags:
        - Ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualAdjustmentRequest"
      responses:
        "201":
          description: Credit or debit points with an operator classification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /issued-rewards/list:
    post:
      operationId: listIssuedRewards
      summary: List a member's issued reward wallet
      tags:
        - Issued Rewards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssuedRewardListRequest"
      responses:
        "200":
          description: List a member's issued reward wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedRewardListResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: true
  /issued-rewards/issue:
    post:
      operationId: issueReward
      summary: Issue a member-specific reward or coupon artifact
      tags:
        - Issued Rewards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssuedRewardIssueRequest"
      responses:
        "201":
          description: Issue a member-specific reward or coupon artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedRewardResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /issued-rewards/cancel:
    post:
      operationId: cancelIssuedReward
      summary: Cancel an unclaimed issued reward
      tags:
        - Issued Rewards
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssuedRewardCancelRequest"
      responses:
        "200":
          description: Cancel an unclaimed issued reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedRewardResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /members/lookup:
    post:
      operationId: lookupMember
      summary: Resolve a member identity
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberLookupRequest"
      responses:
        "200":
          description: Resolve a member identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberLookupResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: true
  /members/enroll:
    post:
      operationId: enrollMember
      summary: Enroll or return a member
      tags:
        - Members
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemberEnrollRequest"
      responses:
        "201":
          description: Enroll or return a member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberEnrollResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /orders/evaluate:
    post:
      operationId: evaluateOrder
      summary: Evaluate accrual and available rewards
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluationRequest"
      responses:
        "200":
          description: Evaluate accrual and available rewards
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluationResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: true
  /accruals:
    post:
      operationId: postAccrual
      summary: Post accrual for a paid order
      tags:
        - Accruals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccrualPostRequest"
      responses:
        "201":
          description: Post accrual for a paid order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /redemptions/reserve:
    post:
      operationId: reserveRedemption
      summary: Reserve a reward for an order
      tags:
        - Redemptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedemptionReserveRequest"
      responses:
        "201":
          description: Reserve a reward for an order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionReservationResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /redemptions/capture:
    post:
      operationId: captureRedemption
      summary: Capture a reserved reward
      tags:
        - Redemptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedemptionCaptureRequest"
      responses:
        "200":
          description: Capture a reserved reward
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionReservationResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /redemptions/reverse:
    post:
      operationId: reverseRedemption
      summary: Release or refund a redemption
      tags:
        - Redemptions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedemptionReverseRequest"
      responses:
        "200":
          description: Release or refund a redemption
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionReservationResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
  /orders/adjust:
    post:
      operationId: adjustOrder
      summary: Adjust accrual after refund, void, or correction
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderAdjustmentRequest"
      responses:
        "201":
          description: Adjust accrual after refund, void, or correction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LedgerResponse"
        default:
          $ref: "#/components/responses/Problem"
      x-lip-safe-to-retry: false
webhooks:
  loyaltyEvent:
    post:
      summary: LIP lifecycle event encoded as CloudEvents 1.0 structured JSON
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoyaltyEvent"
      responses:
        "204":
          description: Event accepted
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    Problem:
      description: RFC 9457 problem details
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetails"
  schemas:
    AccountMetric:
      title: AccountMetric
      additionalProperties: false
      type: object
      required:
        - metric_id
        - unit
        - amount
        - as_of
      properties:
        metric_id:
          minLength: 1
          maxLength: 128
          pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
          description: Opaque, stable identifier within the owning system.
          type: string
        unit:
          anyOf:
            - const: points
              type: string
            - const: visits
              type: string
            - const: stamps
              type: string
            - const: credits
              type: string
            - const: custom
              type: string
        amount:
          type: integer
        as_of:
          format: date-time
          type: string
    AccrualPostRequest:
      title: AccrualPostRequest
      additionalProperties: false
      type: object
      required:
        - context
        - member_id
        - order
      properties:
        context:
          additionalProperties: false
          type: object
          required:
            - protocol_version
            - profile
            - request_id
            - idempotency_key
            - occurred_at
            - source
          properties:
            protocol_version:
              const: "1.0"
              type: string
            profile:
              const: foodservice/1.0
              type: string
            request_id:
              minLength: 1
              maxLength: 128
              pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
              description: Opaque, stable identifier within the owning system.
              type: string
            idempotency_key:
              minLength: 8
              maxLength: 255
              type: string
            occurred_at:
              format: date-time
              type: string
            source:
              additionalProperties: false
              type: object
              required:
                - system
              properties:
                system:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
                instance:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
        member_id:
          minLength: 1
          maxLength: 128
          pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
          description: Opaque, stable identifier within the owning system.
          type: string
        order:
          additionalProperties: false
          type: object
          required:
            - order_id
            - scope
            - channel
            - status
            - business_date
            - placed_at
            - lines
            - totals
          properties:
            order_id:
              minLength: 1
              maxLength: 128
              pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
              description: Opaque, stable identifier within the owning system.
              type: string
            order_number:
              minLength: 1
              maxLength: 128
              type: string
            scope:
              additionalProperties: false
              type: object
              required:
                - program_id
                - brand_id
                - merchant_id
                - location_id
              properties:
                program_id:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
                brand_id:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
                merchant_id:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
                location_id:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
                franchisee_id:
                  minLength: 1
                  maxLength: 128
                  pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                  description: Opaque, stable identifier within the owning system.
                  type: string
            member_id:
              minLength: 1
              maxLength: 128
              pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
              description: Opaque, stable identifier within the owning system.
              type: string
            channel:
              anyOf:
                - const: counter
                  type: string
                - const: drive_thru
                  type: string
                - const: kiosk
                  type: string
                - const: web
                  type: string
                - const: mobile
                  type: string
                - const: pickup
                  type: string
                - const: delivery
                  type: string
                - const: catering
                  type: string
                - const: third_party
                  type: string
                - const: other
                  type: string
            status:
              anyOf:
                - const: open
                  type: string
                - const: authorized
                  type: string
                - const: paid
                  type: string
                - const: partially_refunded
                  type: string
                - const: refunded
                  type: string
                - const: voided
                  type: string
            business_date:
              pattern: ^[0-9]{4}-[0-9]{2}-[0-9]{2}$
              type: string
            placed_at:
              format: date-time
              type: string
            closed_at:
              format: date-time
              type: string
            lines:
              minItems: 1
              type: array
              items:
                additionalProperties: false
                type: object
                required:
                  - line_id
                  - kind
                  - product_id
                  - quantity
                  - unit_price
                  - subtotal
                  - discount
                  - tax
                properties:
                  line_id:
                    minLength: 1
                    maxLength: 128
                    pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                    description: Opaque, stable identifier within the owning system.
                    type: string
                  kind:
                    anyOf:
                      - const: item
                        type: string
                      - const: modifier
                        type: string
                      - const: fee
                        type: string
                  product_id:
                    minLength: 1
                    maxLength: 128
                    pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                    description: Opaque, stable identifier within the owning system.
                    type: string
                  sku:
                    minLength: 1
                    maxLength: 128
                    type: string
                  name:
                    minLength: 1
                    maxLength: 255
                    type: string
                  parent_line_id:
                    minLength: 1
                    maxLength: 128
                    pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                    description: Opaque, stable identifier within the owning system.
                    type: string
                  quantity:
                    minimum: 1
                    type: integer
                  unit_price:
                    additionalProperties: false
                    type: object
                    required:
                      - amount
                      - currency
                    properties:
                      amount:
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Signed amount in the currency's minor unit.
                        type: integer
                      currency:
                        pattern: ^[A-Z]{3}$
                        type: string
                  subtotal:
                    additionalProperties: false
                    type: object
                    required:
                      - amount
                      - currency
                    properties:
                      amount:
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Signed amount in the currency's minor unit.
                        type: integer
                      currency:
                        pattern: ^[A-Z]{3}$
                        type: string
                  discount:
                    additionalProperties: false
                    type: object
                    required:
                      - amount
                      - currency
                    properties:
                      amount:
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Signed amount in the currency's minor unit.
                        type: integer
                      currency:
                        pattern: ^[A-Z]{3}$
                        type: string
                  tax:
                    additionalProperties: false
                    type: object
                    required:
                      - amount
                      - currency
                    properties:
                      amount:
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Signed amount in the currency's minor unit.
                        type: integer
                      currency:
                        pattern: ^[A-Z]{3}$
                        type: string
                  category_ids:
                    uniqueItems: true
                    type: array
                    items:
                      minLength: 1
                      maxLength: 128
                      pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                      description: Opaque, stable identifier within the owning system.
                      type: string
                  tags:
                    uniqueItems: true
                    type: array
                    items:
                      maxLength: 64
                      type: string
                  loyalty_eligible:
                    type: boolean
                  metadata:
                    description: Non-normative extension data. Consumers must ignore unknown keys.
                    type: object
                    patternProperties:
                      ^(.*)$: {}
            totals:
              additionalProperties: false
              type: object
              required:
                - subtotal
                - discount
                - tax
                - tip
                - service_charge
                - total
              properties:
                subtotal:
                  additionalProperties: false
                  type: object
                  required:
                    - amount
                    - currency
                  properties:
                    amount:
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      description: Signed amount in the currency's minor unit.
                      type: integer
                    currency:
                      pattern: ^[A-Z]{3}$
                      type: string
                discount:
                  additionalProperties: false
                  type: object
                  required:
                    - amount
                    - currency
                  properties:
                    amount:
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      description: Signed amount in the currency's minor unit.
                      type: integer
                    currency:
                      pattern: ^[A-Z]{3}$
                      type: string
                tax:
                  additionalProperties: false
                  type: object
                  required:
                    - amount
                    - currency
                  properties:
                    amount:
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      description: Signed amount in the currency's minor unit.
                      type: integer
                    currency:
                      pattern: ^[A-Z]{3}$
                      type: string
                tip:
                  additionalProperties: false
                  type: object
                  required:
                    - amount
                    - currency
                  properties:
                    amount:
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      description: Signed amount in the currency's minor unit.
                      type: integer
                    currency:
                      pattern: ^[A-Z]{3}$
                      type: string
                service_charge:
                  additionalProperties: false
                  type: object
                  required:
                    - amount
                    - currency
                  properties:
                    amount:
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      description: Signed amount in the currency's minor unit.
                      type: integer
                    currency:
                      pattern: ^[A-Z]{3}$
                      type: string
                total:
                  additionalProperties: false
                  type: object
                  required:
                    - amount
                    - currency
                  properties:
                    amount:
                      minimum: -9007199254740991
                      maximum: 9007199254740991
                      description: Signed amount in the currency's minor unit.
                      type: integer
                    currency:
                      pattern: ^[A-Z]{3}$
                      type: string
            tenders:
              minItems: 1
              type: array
              items:
                additionalProperties: false
                type: object
                required:
                  - tender_id
                  - type
                  - amount
                properties:
                  tender_id:
                    minLength: 1
                    maxLength: 128
                    pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
                    description: Opaque, stable identifier within the owning system.
                    type: string
                  type:
                    anyOf:
                      - const: cash
                        type: string
                      - const: card
                        type: string
                      - const: gift_card
                        type: string
                      - const: loyalty
                        type: string
                      - const: third_party
                        type: string
                      - const: other
                        type: string
                  amount:
                    additionalProperties: false
                    type: object
                    required:
                      - amount
                      - currency
                    properties:
                      amount:
                        minimum: -9007199254740991
                        maximum: 9007199254740991
                        description: Signed amount in the currency's minor unit.
                        type: integer
                      currency:
                        pattern: ^[A-Z]{3}$
                        type: string
            metadata:
              description: Non-normative extension data. Consumers must ignore unknown keys.
              type: object
              patternProperties:
                ^(.*)$: {}
        evaluation_id:
          minLength: 1
          maxLength: 128
          pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
          description: Opaque, stable identifier within the owning system.
          type: string
    Balance:
      title: Balance
      additionalProperties: false
      type: object
      required:
        - account_id
        - member_id
        - program_id
        - unit
        - amount
        - reserved
        - available
        - as_of
      properties:
        account_id:
          minLength: 1
          maxLength: 128
          pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
          description: Opaque, stable identifier within the owning system.
          type: string
        member_id:
          minLength: 1
          maxLength: 128
          pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
          description: Opaque, stable identifier within the owning system.
          type: string
        program_id:
          minLength: 1
          maxLength: 128
          pattern: ^[A-Za-z0-9][A-Za-z0-9._:-]*$
          description: Opaque, stable identifier within the owning system.
          type: string
        unit:
          anyOf:
            - const: points
              type: string
            - const: visits
              type: string
            - const: stamps
              type: string
            - const: credits
              type: string
            - const: custom
              type: string
        unit_label:
          minLength: 1
          maxLength: 64
          type: string
        amount:
          type: integer
        reserved:
          minimum: 0
          type: integer
        available:
          type: integer
        as_of:
          format: date-time
          type: string
    CatalogRewardDefinition:
      title: CatalogRewardDefinition
      additionalProperties: false
      type: object
      required:
        - reward_id
        - name
        - cost
        - effect
        - funding
      properties:
        reward_id:
